services:
  server:
    # Pushed by GitHub Actions in aliceastor/megacorps. To retarget to
    # ghcr.io/meaadore1221-afk/*, see .github/workflows/docker.yml
    # (env.GHCR_OWNER + GHCR_PUSH_TOKEN secret).
    image: ghcr.io/aliceastor/megacorps-server:latest
    container_name: megacorps-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:?Set external PostgreSQL connection string}
      WEB_ORIGIN: ${WEB_ORIGIN:?Set WEB_ORIGIN}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      PORTAINER_URL: ${PORTAINER_URL:-}
      PORTAINER_USER: ${PORTAINER_USER:-}
      PORTAINER_PASS: ${PORTAINER_PASS:-}
      PORTAINER_ENDPOINT_ID: ${PORTAINER_ENDPOINT_ID:-4}
      HERMES_CONTAINER: ${HERMES_CONTAINER:-hermes-suite}
      HERMES_GATEWAY_URL: ${HERMES_GATEWAY_URL:-}
      HERMES_DASHBOARD_TOKEN: ${HERMES_DASHBOARD_TOKEN:-}
      HERMES_SSH_HOST: ${HERMES_SSH_HOST:-}
      HERMES_SSH_USER: ${HERMES_SSH_USER:-root}
      HERMES_SSH_PORT: ${HERMES_SSH_PORT:-22}
      HERMES_SSH_KEY_PATH: ${HERMES_SSH_KEY_PATH:-}
      HERMES_SSH_COMMAND: ${HERMES_SSH_COMMAND:-hermes}
      HERMES_SSH_OPTIONS: ${HERMES_SSH_OPTIONS:-}
      ADAPTER_ENV_FALLBACK_ENABLED: ${ADAPTER_ENV_FALLBACK_ENABLED:-false}
      ADAPTER_TARGET_ALLOWLIST: ${ADAPTER_TARGET_ALLOWLIST:-}
      WEBHOOK_ADAPTER_URL: ${WEBHOOK_ADAPTER_URL:-}
      OPENCLAW_WEBHOOK_URL: ${OPENCLAW_WEBHOOK_URL:-}
      WEBHOOK_SHARED_SECRET: ${WEBHOOK_SHARED_SECRET:-}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_AUTH_PER_MINUTE: ${RATE_LIMIT_AUTH_PER_MINUTE:-12}
      RATE_LIMIT_CHAT_PER_MINUTE: ${RATE_LIMIT_CHAT_PER_MINUTE:-40}
      RATE_LIMIT_WEBHOOK_PER_MINUTE: ${RATE_LIMIT_WEBHOOK_PER_MINUTE:-120}
      RATE_LIMIT_OPERATOR_PER_MINUTE: ${RATE_LIMIT_OPERATOR_PER_MINUTE:-20}
      RATE_LIMIT_WRITE_PER_MINUTE: ${RATE_LIMIT_WRITE_PER_MINUTE:-120}
      RATE_LIMIT_READ_PER_MINUTE: ${RATE_LIMIT_READ_PER_MINUTE:-600}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      DISPATCH_LOOP_ENABLED: ${DISPATCH_LOOP_ENABLED:-true}
      DISPATCH_LOOP_INTERVAL_MS: ${DISPATCH_LOOP_INTERVAL_MS:-30000}
      BUDGET_RESET_ENABLED: ${BUDGET_RESET_ENABLED:-true}
      BUDGET_RESET_DAY: ${BUDGET_RESET_DAY:-1}
      TASK_RUN_WORKER_ENABLED: ${TASK_RUN_WORKER_ENABLED:-true}
      TASK_RUN_WORKER_INTERVAL_MS: ${TASK_RUN_WORKER_INTERVAL_MS:-2000}
      TASK_RUN_WORKER_BATCH_SIZE: ${TASK_RUN_WORKER_BATCH_SIZE:-2}
      TASK_RUN_WORKER_ID: ${TASK_RUN_WORKER_ID:-megacorps-server}
    ports:
      - "4000:4000"
    volumes:
      - server_data:/app/data
    networks:
      - megacorps

  web:
    image: ghcr.io/aliceastor/megacorps-web:latest
    container_name: megacorps-web
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    volumes:
      - web_cache:/app/apps/web/.next/cache
    networks:
      - megacorps

networks:
  megacorps:
    driver: bridge

volumes:
  server_data:
  web_cache:
